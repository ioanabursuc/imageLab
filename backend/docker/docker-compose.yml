version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: imagelab-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5437:5432"
    volumes:
      - imagelab_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: imagelab-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  traefik:
    image: traefik:v3.0
    container_name: imagelab-traefik
    ports:
      - "80:80"
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./path.yaml:/etc/traefik/path.yaml:ro
    restart: unless-stopped

  user-service:
    build:
      context: ..
      dockerfile: user/Dockerfile
    container_name: imagelab-user
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - rabbitmq
    restart: unless-stopped

  auth-service:
    build:
      context: ..
      dockerfile: auth/Dockerfile
    container_name: imagelab-auth
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - rabbitmq
    restart: unless-stopped

  image-service:
    build:
      context: ..
      dockerfile: image/Dockerfile
    container_name: imagelab-image
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      UPLOAD_PATH: /app/uploads
    volumes:
      - imagelab_uploads:/app/uploads
    ports:
      - "8083:8083"
    depends_on:
      - postgres
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: imagelab-ollama
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llava && wait"]
    restart: unless-stopped

  ai-service:
    build:
      context: ..
      dockerfile: ai/Dockerfile
    container_name: imagelab-ai
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      IMAGE_SERVICE_URL: http://image-service:8083
    ports:
      - "8084:8084"
    depends_on:
      - image-service
      - ollama
    restart: unless-stopped

volumes:
  imagelab_postgres_data:
  imagelab_uploads:
  ollama_models: